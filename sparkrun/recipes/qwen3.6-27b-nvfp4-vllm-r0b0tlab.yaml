recipe_version: "2"
name: qwen3.6-27b-nvfp4-vllm-r0b0tlab
description: Qwen3.6-27B native NVFP4 weights on one GB10 with production FP8 KV
model: nvidia/Qwen3.6-27B-NVFP4
model_revision: 0893e1606ff3d5f97a441f405d5fc541a6bdf404
runtime: vllm
runtime_version: "0.25.1"
container: ghcr.io/r0b0tlab/sm121-vllm-nvfp4:v0.25.1-production
min_nodes: 1
max_nodes: 1
metadata:
  maintainer: r0b0tlab
  model_params: 27B
  model_dtype: nvfp4
  kv_dtype: fp8
  quantization: nvfp4
  quant_bits: 4
defaults:
  host: 0.0.0.0
  port: 8000
  tensor_parallel: 1
  max_model_len: 8192
  max_num_seqs: 32
  max_num_batched_tokens: 8192
  gpu_memory_utilization: 0.75
  served_model_name: nvidia/Qwen3.6-27B-NVFP4
  speculative_config: '{"method":"mtp","num_speculative_tokens":2}'
env:
  R0B0TLAB_QWEN27_NATIVE_W4A4: "1"
  R0B0TLAB_NVFP4_KV_ENABLED: "0"
  FLASHINFER_NVCC_THREADS: "2"
command: |
  vllm serve {model} --served-model-name {served_model_name} \
    --host {host} --port {port} -tp {tensor_parallel} --dtype bfloat16 \
    --attention-backend FLASHINFER --kv-cache-dtype fp8 --max-model-len {max_model_len} \
    --max-num-seqs {max_num_seqs} --max-num-batched-tokens {max_num_batched_tokens} \
    --gpu-memory-utilization {gpu_memory_utilization} \
    --language-model-only --reasoning-parser qwen3 \
    --enable-auto-tool-choice --tool-call-parser qwen3_xml \
    --speculative-config '{speculative_config}'
executor_config:
  auto_remove: false
  restart_policy: unless-stopped
